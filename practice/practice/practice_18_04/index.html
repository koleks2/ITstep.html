<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>document</title>
    <style type="text/css" id="operaUserStyle"></style>
</head>

<body class="bg-slate-200 flex items-center justify-center min-h-screen">

    <div class="flex flex-col md:flex-row bg-white rounded-3xl overflow-hidden shadow-lg max-w-2xl w-full">

        <div class="flex flex-col items-center text-center 
    bg-gradient-to-b from-indigo-500 to-indigo-700 
    text-white p-8 w-full md:w-1/2 rounded-b-3xl md:rounded-none md:rounded-l-3xl">

            <h2 class="text-slate-200">Your Result</h2>

            <div class="my-6 w-32 h-32 rounded-full 
                bg-gradient-to-b from-indigo-700 to-indigo-500 
                flex flex-col items-center justify-center shadow-inner">
                <p class="text-5xl font-extrabold text-white">76</p>
                <p class="text-slate-300 text-sm mt-1">of 100</p>
            </div>

            <h3 class="text-xl font-semibold">Great</h3>

            <p class="text-slate-300 text-sm mt-2 px-4">
                You scored higher than 65% of the people who have taken these tests.
            </p>
        </div>

        <div class="p-6 w-full md:w-1/2">

            <h2 class="font-semibold mb-4">Summary</h2>

            <div class="space-y-3">

                <div class="flex justify-between p-3 rounded-xl bg-red-100">
                    <span class="text-red-500 font-medium">Reaction</span>
                    <span><b>80</b> <span class="text-gray-400">/ 100</span></span>
                </div>

                <div class="flex justify-between p-3 rounded-xl bg-yellow-100">
                    <span class="text-yellow-600 font-medium">Memory</span>
                    <span><b>92</b> <span class="text-gray-400">/ 100</span></span>
                </div>

                <div class="flex justify-between p-3 rounded-xl bg-green-100">
                    <span class="text-green-600 font-medium">Verbal</span>
                    <span><b>61</b> <span class="text-gray-400">/ 100</span></span>
                </div>

                <div class="flex justify-between p-3 rounded-xl bg-blue-100">
                    <span class="text-blue-600 font-medium">Visual</span>
                    <span><b>73</b> <span class="text-gray-400">/ 100</span></span>
                </div>

            </div>

            <button class="mt-6 w-full py-3 rounded-full bg-slate-700 text-white hover:bg-indigo-600 transition">
                Continue
            </button>

        </div>

    </div>

</body>

</html>
