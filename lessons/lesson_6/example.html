<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        table{
            width: 80%;
            min-width: 650px;
            max-width: 800px;

            margin: 0 auto;

            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif
        }

        caption{
            text-align: right;
            text-transform: uppercase;
            color: #666;
            font-weight: 700;
        }
        th{
            text-transform: uppercase;
            color: #fff;
        }
        th, td{
            text-align: center;
            padding: 1em 0;
        }

        tr td:first-child{
            text-align: left;
            color: #666;
            padding-left: 0.7em;
        }
        .col1{
            background-color: #ddd;
            width: auto;
        }
        .col2{
            background-color: #17d0d3;
            width: 17%;
        }
        .col3{
            background-color: #8ac149;
            width: 17%;
        }
        .col4{
            background-color: #feca28;
            width: 17%;
        }
        .col5{
            background-color: #f44236;
            width: 17%;
        }
        span{
            color: #fff;
            width: 700;
            font-size: 1.2em;
            display: inline-block;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            line-height: 25px;
        }

        thead{
            border-bottom: 1px solid #cbe7e7;
        }
        tfoot{
            border-top: 1px solid #cbe7e7;
        }

    </style>

</head>
<body>
    <table>
        <caption>TITLE TABLE</caption>

        <colgroup>
            <col class="col1">
            <col class="col2">
            <col class="col3">
            <col class="col4">
            <col class="col5">
        </colgroup>

        <thead>
            <tr>
                <th>specification</th>
                <th>free</th>
                <th>basic</th>
                <th>standart</th>
                <th>premium</th>
            </tr>
        </thead>

        <tfoot>
            <tr>
                <th>Total</th>
                <th>$ 0.00</th>
                <th>$ 9.99</th>
                <th>$ 19.99</th>
                <th>$ 29.99</th>
            </tr>
        </tfoot>
        <tbody>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
            </tr>
        </tbody>

    </table>
</body>
</html>
