<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden hover</title>
    <style>
        .hover-elem{
            position: relative;
            width: 200px;
            height: 50px;
            margin: 0 auto;
            background-color: cadetblue;
            text-align: center;
            padding-top: 25px;
        }

        .hidden-elem{
            display: none;
            position: absolute;
            width: 200px;
            height: 50px;background-color: cornflowerblue;
            margin: auto;
            top: 75px;
            padding-top: 25px;
        }
        .hover-elem:hover .hidden-elem{
            display: block;
        }
    </style>
</head>

<body>
    <div class="hover-elem">наведи на меня!
        <div class="hidden-elem">я спрятаный элемент</div>
    </div>
</body>

</html>
