<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>
</head>

<body class="bg-slate-900 flex items-center justify-center font-sans bold min-h-screen">

    <div class="bg-slate-800 w-full max-w-sm sm:max-w-md md:max-w-lg p-6 sm:p-8 rounded-3xl shadow-x">
        <div class="relative group w-fit cursor-pointer">
            <img src="./image/image-equilibrium.jpg" class="rounded-2xl block" alt="">

            <div class="absolute flex items-center justify-center inset-0 rounded-2xl bg-teal-400/40 opacity-0 
            group-hover:opacity-100 transition duration-300">
                <img src="./image/icon-view.svg" alt="">

            </div>

        </div>



        <h2 class="text-2xl font-bold text-gray-200 py-3
        hover:text-teal-300 cursor-pointer">Equilibrium #3429</h2>

        <p class="text-slate-400">Our Equilibrium collection promotes balance and calm.</p>

        <div class="flex py-3 items-center justify-between">
            <span class="text-gray-200 font-bold flex items-center gap-2 text-teal-300"><img
                    src="./image/icon-ethereum.svg" alt="">0.041 ETH</span>
            <span class="text-gray-200 flex items-center gap-2"><img src="./image/icon-clock.svg" alt="">
                <p class="text-gray-200">3 days left</p>
            </span>
        </div>

        <hr class="border-slate-700">
        <div class="flex items-center pt-3 gap-4">
            <img class="w-10 border-white-100" src="./image/image-avatar.png" alt="">
            <div><span class="font-bold text-slate-500">Creation of</span> <span class="text-gray-200
                hover:text-teal-300 cursor-pointer">Jules Wyvern</span></div>

        </div>
    </div>

</body>

</html>
