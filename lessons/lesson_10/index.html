<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container {
            background-color: aliceblue;
            display: flex;
            border: blue 1px solid;
            border-radius: 10px;
            margin: 2em;
            padding: 0.5em;

            height: 300px;

            gap: 1.5em;

            flex-wrap: wrap;

            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        img {
            width: calc(20%);
            box-shadow: 2px 2px 15px #000000e3;
        }
        .flex-elem {
            /* width: 150px; */
            flex-basis: 100px;
            height: 150px;

            display: flex;
            justify-content: center;
            flex-wrap: nowrap;
            align-items: center;
            
            border-radius: 10px;
            
        }

        .elem1 {
            background-color: green;
            /* flex-shrink: 1; */
            /* order: 3; */
        }
        .elem2 {
            background-color: blue;
            /* order: 2; */
            /* flex-shrink: 2; */
            align-self: flex-start;
        }
        .elem3 {
            background-color: red;
            /* order: 4; */
            flex-shrink: 2;
        }
        .elem4 {
            background-color: yellow;
            /* flex-shrink: 1; */
            /* order: 1; */
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="flex-elem elem1">1</div>
        <div class="flex-elem elem2">2</div>
        <div class="flex-elem elem3">3</div>
        <div class="flex-elem elem4">4</div>
        <!-- <img src="../../shared_resursed/cat_clean_64.png" alt="">
        <img src="../../shared_resursed/cat_clean_64.png" alt="">
        <img src="../../shared_resursed/cat_clean_64.png" alt=""> -->
    </div>
</body>

</html>
