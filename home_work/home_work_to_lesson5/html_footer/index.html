<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html footer</title>
    <style>
        footer {
            background-color: #2c5790;
            margin-top: 540px;
            color: aliceblue;
            height: 230px;
        }

        .flex {
            display: flex;
        }

        #HAGN {
            margin-left: 100px;
            margin-top: 10px;
        }
        #img{
            margin-top: 20px;
            margin-left: 300px;
            padding: 30px;
        }
        img{
            margin: 10px;
        }
        hr{
            width: 1000px;
        }
        #www{
            text-align: center;
        }

        #facebook:hover{
            cursor: pointer;
            content: url(./image/fb.png);
        }
        #intagram:hover{
            cursor: pointer;
            content: url(./image/insta.png);
        }
        #youtube:hover{
            cursor: pointer;
            content: url(./image/youtube.png);
        }
        #BFCP{
            margin-left: 500px;
            margin-top: 10px;
        }
        #underline:hover{
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <footer>
        <div class="flex">
            <div id="HAGN">
                <p id="underline">Home</p>
                <p id="underline">About</p>
                <p id="underline">Gallery</p>
                <p id="underline">News</p>
            </div>
            <div id="BFCP">
                <p id="underline">Blog</p>
                <p id="underline">FAQ</p>
                <p id="underline">Contacts</p>
                <p id="underline">Privat & cookies</p>
            </div>
            <div id="img"><img id="facebook" src="./image/fb_gray.png" alt="facebook image"><img id="intagram" src="./image/insta_gray.png"
                    alt="intagram image"><img id="youtube" src="./image/youtube_gray.png" alt="youtube image"></div>
        </div>
        <hr>
        <div id="www">Copyright c Company 2018-2019</div>

    </footer>
</body>

</html>
