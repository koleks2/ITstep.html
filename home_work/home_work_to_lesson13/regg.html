<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background: #eee;
            font-family: Arial;
            padding: 30px
        }

        .form {
            background: #ddd;
            padding: 30px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .2)
        }

        .row {
            display: flex;
            gap: 40px
        }

        .col {
            flex: 1
        }

        h3 {
            margin-bottom: 20px
        }

        .text,
        .password {
            width: 100%;
            border: none;
            border-bottom: 1px solid #999;
            padding: 10px 5px;
            margin-bottom: 20px;
            background: transparent;
            outline: none
        }

        .inline {
            display: flex;
            gap: 10px
        }

        .checkbox {
            display: block;
            margin-bottom: 10px;
            font-size: 14px
        }

        .btn {
            background: #0d8b87;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer
        }

        .btn:hover {
            background: #0a6f6b
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end
        }

        @media screen and (min-width:600px) and (max-width:900px) {
            .row {
                flex-direction: column;
            }
        }

        @media (max-width:600px) {
            .row {
                flex-direction: column;
            }

            .inline {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="form">
        <div class="row">

            <div class="col">
                <h3>Registration form</h3>

                <input class="text" placeholder="Username">
                <input class="text" placeholder="Email address">

                <div class="inline">
                    <input class="password" placeholder="Password">
                    <input class="password" placeholder="Confirm password">
                </div>

                <label class="checkbox">
                    <input type="checkbox"> I want to receive news and special offers
                </label>

                <label class="checkbox">
                    <input type="checkbox"> I agree with the Terms and Conditions
                </label>
            </div>

            <div class="col">
                <h3>Personal details</h3>

                <div class="inline">
                    <input class="text" placeholder="First name">
                    <input class="text" placeholder="Last name">
                </div>

                <div class="inline">
                    <input class="text" value="Male">
                    <input class="text" placeholder="mm/dd/yyyy">
                </div>
            </div>

        </div>

        <div class="footer">
            <button class="btn">SUBMIT</button>
        </div>
    </div>

</body>

</html>
