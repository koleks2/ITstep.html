<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll table</title>
    <style>
        table {
            border-collapse: collapse;
            min-width: 600px;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        thead th {
            background: #82d5df;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tr th:first-child,
        tr td:first-child {
            background: #82d5df;
            font-weight: bold;
            position: sticky;
            left: 0;
            z-index: 1;
        }

        thead th:first-child {
            z-index: 3;
        }

        tbody tr:nth-child(even) {
            background: #e2e2e2;
        }

        div {
            max-height: 500px;
            max-width: 700px;
            overflow: auto;
        }
    </style>
</head>
